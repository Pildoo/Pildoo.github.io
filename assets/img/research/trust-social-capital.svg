<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" role="img" aria-labelledby="title desc">
  <title id="title">Integrative model of trust and social capital</title>
  <desc id="desc">Generalized trust supports strong and weak social ties, which provide network-based social resources, while national conditions shape the whole process across 30 countries.</desc>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0L9 4.5L0 9Z" fill="#0b5394"/></marker>
    <marker id="arrow-muted" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0L9 4.5L0 9Z" fill="#8da4b3"/></marker>
  </defs>
  <rect width="720" height="440" rx="22" fill="#f7fafc"/>
  <g font-family="Inter, Arial, sans-serif">
    <text x="30" y="38" fill="#0b5394" font-size="24" font-weight="700">How trust becomes social capital</text>
    <text x="30" y="64" fill="#587084" font-size="14">Integrative model tested with nationally representative data from 30 countries</text>

    <g fill="#6d8290" font-size="11" font-weight="700" text-anchor="middle">
      <text x="125" y="104">PSYCHO-SOCIAL PRECONDITION</text>
      <text x="360" y="104">NETWORK STRUCTURE</text>
      <text x="595" y="104">RESOURCE PRODUCTION</text>
    </g>
    <g>
      <rect x="30" y="121" width="190" height="154" rx="16" fill="#ffffff" stroke="#b9cedd" stroke-width="1.5"/>
      <rect x="265" y="121" width="190" height="154" rx="16" fill="#eaf2f8" stroke="#9bb8cf" stroke-width="1.5"/>
      <rect x="500" y="121" width="190" height="154" rx="16" fill="#e7f2ef" stroke="#82a69e" stroke-width="1.5"/>
    </g>

    <g text-anchor="middle">
      <circle cx="125" cy="165" r="23" fill="#0b5394"/>
      <path d="M114 166l8 8 16-20" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="125" y="211" fill="#0b5394" font-size="18" font-weight="700">Generalized trust</text>
      <text x="125" y="233" fill="#587084" font-size="12">norms of reciprocity</text>

      <circle cx="320" cy="167" r="10" fill="#2f78a5"/><circle cx="351" cy="151" r="10" fill="#2f78a5"/><circle cx="382" cy="168" r="10" fill="#2f78a5"/>
      <path d="M320 167L351 151L382 168" fill="none" stroke="#2f78a5" stroke-width="3"/>
      <text x="360" y="210" fill="#0b5394" font-size="17" font-weight="700">Strong ties</text>
      <text x="360" y="235" fill="#0b5394" font-size="17" font-weight="700">+ weak ties</text>

      <rect x="548" y="145" width="94" height="48" rx="10" fill="#2f8a73"/>
      <path d="M567 170l11 10 23-25" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="595" y="218" fill="#176b5b" font-size="17" font-weight="700">Social resources</text>
      <text x="595" y="240" fill="#587084" font-size="12">support and access</text>
    </g>

    <path d="M220 185H257" fill="none" stroke="#0b5394" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M455 185H492" fill="none" stroke="#0b5394" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M220 245C337 302 429 302 500 245" fill="none" stroke="#8da4b3" stroke-width="2" stroke-dasharray="7 6" marker-end="url(#arrow-muted)"/>
    <text x="360" y="302" text-anchor="middle" fill="#6d8290" font-size="11">direct and tie-mediated pathways</text>

    <rect x="30" y="324" width="660" height="67" rx="14" fill="#edf1f4" stroke="#cbd7df"/>
    <text x="360" y="349" text-anchor="middle" fill="#334e5f" font-size="14" font-weight="700">National context shapes every stage</text>
    <text x="360" y="370" text-anchor="middle" fill="#587084" font-size="12">sociocultural - economic - political - religious conditions</text>
    <g fill="#9aacb8">
      <circle cx="240" cy="382" r="3"/><circle cx="253" cy="382" r="3"/><circle cx="266" cy="382" r="3"/><circle cx="279" cy="382" r="3"/><circle cx="292" cy="382" r="3"/>
      <circle cx="305" cy="382" r="3"/><circle cx="318" cy="382" r="3"/><circle cx="331" cy="382" r="3"/><circle cx="344" cy="382" r="3"/><circle cx="357" cy="382" r="3"/>
      <circle cx="370" cy="382" r="3"/><circle cx="383" cy="382" r="3"/><circle cx="396" cy="382" r="3"/><circle cx="409" cy="382" r="3"/><circle cx="422" cy="382" r="3"/>
      <circle cx="435" cy="382" r="3"/><circle cx="448" cy="382" r="3"/><circle cx="461" cy="382" r="3"/><circle cx="474" cy="382" r="3"/><circle cx="487" cy="382" r="3"/>
    </g>
    <text x="360" y="419" text-anchor="middle" fill="#0b5394" font-size="13" font-weight="700">Trust helps form ties; ties carry resources</text>
  </g>
</svg>
