<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="title desc">
  <title id="title">Trust and social capital across networks</title>
  <desc id="desc">Two clusters are connected by weak bridging ties, illustrating how trust and social resources travel across network boundaries.</desc>
  <rect width="640" height="360" rx="22" fill="#f7fafc"/>
  <text x="32" y="38" fill="#0b5394" font-family="Arial, sans-serif" font-size="19" font-weight="700">Trust travels through social capital</text>
  <text x="32" y="62" fill="#587084" font-family="Arial, sans-serif" font-size="13">strong ties within groups, weak ties across groups</text>
  <g stroke="#c8d9e5" stroke-width="2" fill="none"><path d="M132 141 L188 105 L230 153 L184 203 L132 141"/><path d="M410 141 L465 105 L510 153 L465 203 L410 141"/><path d="M188 105 L184 203"/><path d="M465 105 L465 203"/></g>
  <g stroke="#0b5394" stroke-width="3" fill="none"><path d="M230 153 C292 121 350 121 410 141"/><path d="M230 153 C300 188 349 188 410 141"/></g>
  <g fill="#0b5394"><circle cx="132" cy="141" r="10"/><circle cx="188" cy="105" r="10"/><circle cx="230" cy="153" r="10"/><circle cx="184" cy="203" r="10"/><circle cx="410" cy="141" r="10"/><circle cx="465" cy="105" r="10"/><circle cx="510" cy="153" r="10"/><circle cx="465" cy="203" r="10"/></g>
  <g font-family="Arial, sans-serif"><rect x="252" y="235" width="136" height="62" rx="14" fill="#eaf2f8"/><text x="320" y="260" text-anchor="middle" fill="#0b5394" font-size="14" font-weight="700">weak ties</text><text x="320" y="280" text-anchor="middle" fill="#334e5f" font-size="12">bridging resources</text><text x="320" y="330" text-anchor="middle" fill="#587084" font-size="12">ISSP · generalized trust · health</text></g>
</svg>
