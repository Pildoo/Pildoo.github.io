<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 460" role="img" aria-labelledby="title desc">
  <title id="title">Three dyadic loneliness profiles</title>
  <desc id="desc">Three profiles among 260 caregiver and care-recipient dyads show that loneliness is usually low for both, but can be concentrated in either member of the dyad.</desc>
  <rect width="720" height="460" rx="22" fill="#f7fafc"/>
  <g font-family="Inter, Arial, sans-serif">
    <text x="30" y="38" fill="#0b5394" font-size="24" font-weight="700">Loneliness is not always shared equally</text>
    <text x="30" y="64" fill="#587084" font-size="14">Three profiles among 260 caregiver-care recipient dyads</text>
    <g font-size="12">
      <rect x="450" y="78" width="13" height="13" rx="3" fill="#c96745"/><text x="470" y="89" fill="#587084">caregiver</text>
      <rect x="552" y="78" width="13" height="13" rx="3" fill="#2f78a5"/><text x="572" y="89" fill="#587084">care recipient</text>
    </g>

    <g>
      <rect x="22" y="105" width="676" height="91" rx="13" fill="#ffffff" stroke="#d7e2e9"/>
      <rect x="22" y="206" width="676" height="91" rx="13" fill="#edf4f8" stroke="#c8d9e5"/>
      <rect x="22" y="307" width="676" height="91" rx="13" fill="#f9f0ec" stroke="#ead4ca"/>
    </g>
    <g fill="#334e5f">
      <text x="42" y="136" font-size="24" font-weight="700">74%</text>
      <text x="42" y="159" font-size="14" font-weight="700">Less lonely dyads</text>
      <text x="42" y="178" fill="#6d8290" font-size="11">low for both</text>

      <text x="42" y="237" font-size="24" font-weight="700">16%</text>
      <text x="42" y="260" font-size="14" font-weight="700">Less lonely caregiver</text>
      <text x="42" y="279" fill="#6d8290" font-size="11">severely lonely recipient</text>

      <text x="42" y="338" font-size="24" font-weight="700">10%</text>
      <text x="42" y="361" font-size="14" font-weight="700">Lonely caregiver</text>
      <text x="42" y="380" fill="#6d8290" font-size="11">moderately lonely recipient</text>
    </g>

    <g fill="#e5edf2">
      <rect x="248" y="126" width="405" height="17" rx="8"/><rect x="248" y="156" width="405" height="17" rx="8"/>
      <rect x="248" y="227" width="405" height="17" rx="8"/><rect x="248" y="257" width="405" height="17" rx="8"/>
      <rect x="248" y="328" width="405" height="17" rx="8"/><rect x="248" y="358" width="405" height="17" rx="8"/>
    </g>
    <g>
      <rect x="248" y="126" width="14" height="17" rx="8" fill="#c96745"/><rect x="248" y="156" width="20" height="17" rx="8" fill="#2f78a5"/>
      <rect x="248" y="227" width="21" height="17" rx="8" fill="#c96745"/><rect x="248" y="257" width="365" height="17" rx="8" fill="#2f78a5"/>
      <rect x="248" y="328" width="365" height="17" rx="8" fill="#c96745"/><rect x="248" y="358" width="117" height="17" rx="8" fill="#2f78a5"/>
    </g>
    <g fill="#334e5f" font-size="11" font-weight="700">
      <text x="270" y="139">3%</text><text x="276" y="169">5%</text>
      <text x="277" y="240">5%</text><text x="620" y="270">90%</text>
      <text x="620" y="341">90%</text><text x="372" y="371">29%</text>
    </g>

    <text x="360" y="421" text-anchor="middle" fill="#6d8290" font-size="11">Average conditional probability across three loneliness items</text>
    <rect x="28" y="429" width="664" height="24" rx="12" fill="#0b5394"/>
    <text x="360" y="446" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="700">Dyadic data reveal mismatches hidden by caregiver-only measures</text>
  </g>
</svg>
