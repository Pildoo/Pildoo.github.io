<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" role="img" aria-labelledby="title desc">
  <title id="title">Cross-lagged links between oral health, social engagement, and depressive symptoms</title>
  <desc id="desc">A simplified two-wave path model shows better oral health predicting greater social engagement, and greater social engagement predicting fewer depressive symptoms.</desc>
  <defs>
    <marker id="arrow-blue" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0L9 4.5L0 9Z" fill="#0b5394"/></marker>
    <marker id="arrow-green" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0L9 4.5L0 9Z" fill="#2f8a73"/></marker>
    <marker id="arrow-gray" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><path d="M0 0L9 4.5L0 9Z" fill="#9aacb8"/></marker>
  </defs>
  <rect width="720" height="440" rx="22" fill="#f7fafc"/>
  <g font-family="Inter, Arial, sans-serif">
    <text x="30" y="38" fill="#0b5394" font-size="24" font-weight="700">Engagement links oral and mental health</text>
    <text x="30" y="64" fill="#587084" font-size="14">Two-wave cross-lagged model, 2018 to 2020 (N = 3,860)</text>
    <text x="150" y="92" text-anchor="middle" fill="#6d8290" font-size="13" font-weight="700">2018</text>
    <text x="570" y="92" text-anchor="middle" fill="#6d8290" font-size="13" font-weight="700">2020</text>

    <g fill="#ffffff" stroke="#b9cedd" stroke-width="1.5">
      <rect x="38" y="108" width="224" height="58" rx="12"/><rect x="458" y="108" width="224" height="58" rx="12"/>
      <rect x="38" y="212" width="224" height="58" rx="12"/><rect x="458" y="212" width="224" height="58" rx="12"/>
      <rect x="38" y="316" width="224" height="58" rx="12"/><rect x="458" y="316" width="224" height="58" rx="12"/>
    </g>
    <g fill="#334e5f" font-size="16" font-weight="700" text-anchor="middle">
      <text x="150" y="143">Oral health</text><text x="570" y="143">Oral health</text>
      <text x="150" y="247">Social engagement</text><text x="570" y="247">Social engagement</text>
      <text x="150" y="351">Depressive symptoms</text><text x="570" y="351">Depressive symptoms</text>
    </g>

    <g fill="none" stroke="#c7d3db" stroke-width="2" marker-end="url(#arrow-gray)">
      <path d="M262 137H450"/><path d="M262 241H450"/><path d="M262 345H450"/>
    </g>
    <g fill="#8a9ba6" font-size="11" text-anchor="middle">
      <text x="356" y="129">stability</text><text x="356" y="233">stability</text><text x="356" y="337">stability</text>
    </g>

    <path d="M262 146C338 159 382 203 458 229" fill="none" stroke="#0b5394" stroke-width="4" marker-end="url(#arrow-blue)"/>
    <rect x="319" y="160" width="104" height="25" rx="12" fill="#e8f0f7"/>
    <text x="371" y="177" text-anchor="middle" fill="#0b5394" font-size="13" font-weight="700">beta = .063***</text>

    <path d="M262 252C338 265 382 308 458 333" fill="none" stroke="#2f8a73" stroke-width="4" marker-end="url(#arrow-green)"/>
    <rect x="321" y="269" width="100" height="25" rx="12" fill="#e7f2ef"/>
    <text x="371" y="286" text-anchor="middle" fill="#176b5b" font-size="13" font-weight="700">beta = -.031*</text>

    <path d="M262 334C337 319 383 273 458 252" fill="none" stroke="#9aacb8" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrow-gray)"/>
    <text x="367" y="312" text-anchor="middle" fill="#7d909c" font-size="12">beta = -.013, ns</text>

    <rect x="28" y="397" width="664" height="27" rx="14" fill="#0b5394"/>
    <text x="360" y="416" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Social engagement partly mediated the oral health-depression pathway</text>
  </g>
</svg>
