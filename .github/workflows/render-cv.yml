name: Build CV from LaTeX

on:
  push:
    branches:
      - main
      - master
    paths:
      - "cv/**"
      - "_data/cv.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-cv:
    name: Build LaTeX CV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux Libertine font
        run: sudo apt-get update && sudo apt-get install -y fonts-linuxlibertine

      - name: Compile CV with XeLaTeX
        uses: xu-cheng/latex-action@v4
        with:
          root_file: main.tex
          working_directory: cv
          latexmk_use_xelatex: true
          args: -interaction=nonstopmode -halt-on-error

      - name: Copy PDF into the website assets
        run: cp cv/main.pdf assets/pdf/Pildoo_Sung_CV_2026.pdf

      - name: Upload CV artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Pildoo Sung CV
          path: |
            cv/main.pdf
            assets/pdf/Pildoo_Sung_CV_2026.pdf

      - name: Commit generated PDF
        run: |
          git config user.name "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add assets/pdf/Pildoo_Sung_CV_2026.pdf
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "chore: render the latest CV"
          git push
